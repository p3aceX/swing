steps:
  # Build the Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/swing-backend:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/swing-backend:latest
      - .

  # Push to Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/swing-backend:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/swing-backend:latest

  # Run migrations as a one-shot Cloud Run Job before deploying the new revision.
  # This keeps RUN_DB_MIGRATIONS out of the service env so restarts don't re-run them.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - swing-migrate
      - --image=gcr.io/$PROJECT_ID/swing-backend:$COMMIT_SHA
      - --region=asia-south1
      - --update-env-vars=RUN_DB_MIGRATIONS=true,SERVICE_MODE=api
      - --wait

  # Deploy to Cloud Run (no RUN_DB_MIGRATIONS — migrations already ran above)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - swing-backend
      - --image=gcr.io/$PROJECT_ID/swing-backend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --min-instances=1
      - --max-instances=3
      - --timeout=600
      - --update-env-vars=RUN_DB_MIGRATIONS=false

images:
  - gcr.io/$PROJECT_ID/swing-backend:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/swing-backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
