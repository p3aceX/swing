steps:
  # Build the Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/swing-backend:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/swing-backend:latest
      - .

  # Push to Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/swing-backend:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/swing-backend:latest

  # Run migrations as a one-shot Cloud Run Job before deploying the new revision.
  # Creates the job on first deploy; updates image on subsequent deploys.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        job_secrets="DATABASE_URL=DATABASE_URL:latest"
        job_envvars="SERVICE_MODE=migrate"
        job_image="gcr.io/$PROJECT_ID/swing-backend:$COMMIT_SHA"
        if gcloud run jobs describe swing-migrate --region=asia-south1 --project=$PROJECT_ID 2>/dev/null; then
          gcloud run jobs update swing-migrate \
            --image="$job_image" \
            --region=asia-south1 \
            --update-env-vars="$job_envvars" \
            --update-secrets="$job_secrets"
        else
          gcloud run jobs create swing-migrate \
            --image="$job_image" \
            --region=asia-south1 \
            --set-env-vars="$job_envvars" \
            --set-secrets="$job_secrets" \
            --max-retries=0
        fi
        gcloud run jobs execute swing-migrate --region=asia-south1 --wait

  # Deploy to Cloud Run (no RUN_DB_MIGRATIONS — migrations already ran above)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - swing-backend
      - --image=gcr.io/$PROJECT_ID/swing-backend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --min-instances=1
      - --max-instances=3
      - --timeout=600
      - --update-env-vars=RUN_DB_MIGRATIONS=false
      - --update-secrets=RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest,TWOFACTOR_API_KEY=TWOFACTOR_API_KEY:latest,PHONEPE_CLIENT_ID=PHONEPE_CLIENT_ID:latest,PHONEPE_CLIENT_SECRET=PHONEPE_CLIENT_SECRET:latest

images:
  - gcr.io/$PROJECT_ID/swing-backend:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/swing-backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
