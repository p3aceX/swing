name: swing_live
description: "Minimal YouTube live streaming for grassroots cricket."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5

  # YouTube auth + API
  google_sign_in: ^6.2.1
  googleapis: ^13.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Camera + permissions
  camera: ^0.11.0
  permission_handler: ^12.0.1
  wakelock_plus: ^1.6.0

  # Studio Mode: publish camera to MediaMTX via WHIP (WebRTC). YouTube still
  # uses Pedro/RTMP; this is independent.
  flutter_webrtc: ^0.12.0
  http: ^1.2.0
  connectivity_plus: ^6.1.0

  # QR scanning for studio pairing.
  mobile_scanner: ^5.2.3
  screen_brightness: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
