name: swing_player
description: Swing player app for cricket identity, scoring, discovery, and training.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_host_core:
    path: ../packages/flutter_host_core
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^13.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.1.1
  firebase_messaging: ^16.1.2
  razorpay_flutter: ^1.3.6
  phonepe_payment_sdk: ^3.0.2
  share_plus: ^10.0.2
  screenshot: ^3.0.0
  path_provider: ^2.1.0
  lottie: ^3.1.2
  confetti: ^0.8.0
  connectivity_plus: ^6.0.5
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  flutter_svg: ^2.0.10+1
  mobile_scanner: ^5.0.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  audioplayers: ^6.1.0
  pinput: ^5.0.0
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.9.0
  image_picker: ^1.1.2
  image_cropper: ^8.1.0
  health: ^13.3.1
  permission_handler: ^12.0.1
  shared_preferences: ^2.2.0
  youtube_player_iframe: ^5.2.2
  syncfusion_flutter_gauges: ^26.1.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/ui/rank_frames/
    - assets/bg/
    - assets/logo/
