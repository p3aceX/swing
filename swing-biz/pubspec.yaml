name: swing_biz
description: Swing Biz — run your academy, coaching or arena business.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_host_core:
    path: ../packages/flutter_host_core
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.0
  go_router: ^13.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.1.1
  pinput: ^5.0.0
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  pdf: ^3.11.1
  printing: ^5.13.4
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  fl_chart: ^0.68.0
  share_plus: ^10.1.4
  path: ^1.9.0
  path_provider: ^2.1.5
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
